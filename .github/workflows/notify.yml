name: Notify Telegram on GitHub Push
description: |
  Send notifications to Telegram groups (topics) and channel on push to main branch.
on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Telegram groups (topics only)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          # 群组话题配置：只发送文字更新通知
          declare -A TOPICS
          TOPICS["-1003831627871"]="5"   # tgmShare 群话题5
          TOPICS["-1003365897434"]="2"   # tgmShareAI 群话题2

          for chat_id in "${!TOPICS[@]}"; do
            thread_id="${TOPICS[$chat_id]}"
            response=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="$chat_id" \
              -d message_thread_id="$thread_id" \
              --data-urlencode "text=📝 新增资源

${{ github.event.head_commit.message }}

🔗 超过100T资料总站网站：https://doc.869hr.uk
📦 完整资源链接：https://t.me/dabaziyuan")
            echo "Group $chat_id topic $thread_id: $response"
          done

      - name: Send full content to Telegram channel
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          # 频道：发送完整资源信息
          if [ -n "$CHANNEL_ID" ]; then
            response=$(curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -d chat_id="$CHANNEL_ID" \
              --data-urlencode "text=📦 新增资源推送

${{ github.event.head_commit.message }}

🔗 超过100T资料总站网站：https://doc.869hr.uk
📂 查看详情：${{ github.event.head_commit.url }}")
            echo "Channel response: $response"
          fi
